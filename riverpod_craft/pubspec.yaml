name: riverpod_craft
description: A code generation toolkit for Riverpod state management. Better syntax and side effect solution with commands.
version: 0.1.0
homepage: https://github.com/Ahmed-Omar-Hommir/riverpod_craft
repository: https://github.com/Ahmed-Omar-Hommir/riverpod_craft
issue_tracker: https://github.com/Ahmed-Omar-Hommir/riverpod_craft/issues

environment:
  sdk: ^3.8.1
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  dio: ^5.8.0
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
