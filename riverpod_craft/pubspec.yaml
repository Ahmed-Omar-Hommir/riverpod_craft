name: riverpod_craft
description: A code generation runtime library for simplified Riverpod state management with commands and data providers.
version: 1.0.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  dio: ^5.8.0
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
